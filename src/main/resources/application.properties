# Datasource - values come from environment variables at runtime.
quarkus.datasource.db-kind=mysql

# Production profile database configuration (used in Cloud Run)
%prod.quarkus.datasource.username=${DB_USERNAME:root}
%prod.quarkus.datasource.password=${DB_PASSWORD:mcQ.r-d#&2f;rU5-}
%prod.quarkus.datasource.jdbc.url=${DB_JDBC_URL:jdbc:mysql://34.46.248.50:3306/todogrupo1}

# drop and create the database at startup (use `update` to only update the schema)
quarkus.hibernate-orm.schema-management.strategy=${DB_SCHEMA_STRATEGY:update}

# Firebase admin SDK - path to service account JSON (mount as secret / volume)
firebase.service-account-location=${FIREBASE_SERVICE_ACCOUNT_LOCATION:none}
%dev.firebase.service-account-location=medsync-firebase-adminsdk.json

# App metadata (expuesto por GET /status)
app.name=hello-world
app.version=${APP_VERSION:dev}

# HTTP
quarkus.http.host=0.0.0.0
quarkus.http.port=${PORT:8080}

# CORS Configuration
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.headers=accept, authorization, content-type, x-requested-with
quarkus.http.cors.methods=GET, OPTIONS, POST, PUT, DELETE

# Test profile: H2 in-memory database
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
%test.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
%test.quarkus.hibernate-orm.sql-load-script=no-file
%test.firebase.service-account-location=none

%dev.quarkus.hibernate-orm.dev-ui.allow-hql=true

%dev.quarkus.datasource.dev-ui.allow-sql=true
